<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSI: Célula Sob Investigação</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="tela-menu" class="tela ativa">
        <img src="assets/img/1.png" alt="Menu Principal" class="fundo-img">
        
        <button id="btn-jogar" class="hitbox hitbox-jogar"></button>
        <button id="btn-glossario" class="hitbox hitbox-glossario"></button>
        <button id="btn-creditos" class="hitbox hitbox-creditos"></button>
        <button id="btn-configuracoes" class="hitbox hitbox-configuracoes"></button>
    </div>

    <div id="tela-tabuleiro" class="tela">
        <img src="assets/img/Mapa_v0.01.png" alt="Tabuleiro" class="fundo-img">
        
        <div id="grade-tabuleiro"></div>
        

        </div>

    <div id="modal-investigacao" style="display: none;"></div>

    <!-- Menu In-Game (Abre com M) -->
    <div id="menu-in-game" class="modal-oculto">
        <div class="conteudo-menu">
            <h2 style="color: #2196F3;">Pausa (Menu)</h2>
            <button id="btn-in-voltar">Voltar ao Menu Principal</button>
            <button id="btn-in-glossario">Glossário</button>
            <button id="btn-in-suspeitos">Lista de Suspeitos</button>
            <p style="margin-top: 15px; font-size: 0.8em; color: #888;">Pressione 'M' novamente para voltar ao jogo</p>
        </div>
    </div>

    <!-- Glossário (Estilo Pasta Confidencial) -->
    <div id="modal-glossario" class="modal-oculto">
        <div class="pasta-container">
            <!-- Botão de fechar no formato de um "X" vermelho no canto da pasta -->
            <button class="fechar-submodal btn-fechar-pasta" data-target="modal-glossario">X</button>
            
            <!-- Página Esquerda: Índice de Arquivos -->
            <div class="pagina-esquerda">
                
                <h3 style="margin-top: 15px; color: #8b0000;">👥 Suspeitos</h3>
                <ul id="lista-suspeitos" class="lista-glossario"></ul>

                <h3 style="margin-top: 20px; color: #00008b;">📍 Locais da Célula</h3>
                <ul id="lista-locais" class="lista-glossario"></ul>
            </div>

            <!-- Página Direita: Visualização do Arquivo -->
            <div class="pagina-direita">
                <h2 id="detalhe-titulo">Selecione um arquivo</h2>
                <div id="detalhe-imagem-container">
                    <!-- A imagem do local/suspeito será injetada aqui -->
                    <img id="detalhe-imagem" src="" alt="Imagem do Arquivo" style="display: none;">
                </div>
                <p id="detalhe-descricao" style="margin-top: 15px;">
                    Aguardando seleção de arquivo do banco de dados...
                </p>
            </div>
        </div>
    </div>

    <!-- Suspeitos (Bloco de Anotações) -->
    <div id="modal-suspeitos" class="modal-oculto">
        <div class="bloco-anotacoes">
            
            <div class="bloco-cabecalho">
                <!-- Bolinhas simulando o espiral do caderno -->
                <div class="espiral"></div>
                <h2>BLOCO DE ANOTAÇÕES</h2>
                <button class="fechar-submodal btn-fechar-bloco" data-target="modal-suspeitos">X</button>
            </div>

            <!-- O conteúdo da lista será injetado aqui pelo JavaScript -->
            <div id="bloco-conteudo" class="bloco-conteudo"></div>
            
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
